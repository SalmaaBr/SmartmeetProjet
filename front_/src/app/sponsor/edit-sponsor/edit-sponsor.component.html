<div class="container mt-5">
    <div class="card shadow-lg border-primary">
      <div class="card-header bg-primary text-white text-center">
        <h2>Modifier le sponsor</h2>
      </div>
      <div class="card-body">
        <form (ngSubmit)="updateSponsor()" #sponsorForm="ngForm">

          <!-- Nom du sponsor -->
          <div class="mb-3">
            <label class="form-label">Nom du sponsor :</label>
            <input type="text" class="form-control border-primary" 
                   [(ngModel)]="sponsor.name" name="name" required>
          </div>

          <!-- Logo -->
          <div class="mb-3">
            <label class="form-label">URL du logo :</label>
            <input type="url" class="form-control border-primary" 
                   [(ngModel)]="sponsor.logo" name="logo" required>
          </div>

          <!-- Contribution -->
          <div class="mb-3">
            <label class="form-label">Montant de la contribution :</label>
            <input type="number" class="form-control border-primary" 
                   [(ngModel)]="sponsor.contributionAmount" 
                   name="contributionAmount" required>
          </div>

          <!-- Type de partenariat -->
          <div class="mb-3">
            <label class="form-label">Type de partenariat :</label>
            <select class="form-select border-primary" 
                    [(ngModel)]="sponsor.partnershipType" 
                    name="partnershipType">
              <option value="">Sélectionnez un type</option>
              <option *ngFor="let type of partnershipTypes" [value]="type">
                {{ type }}
              </option>
            </select>
          </div>

          <!-- Boutons -->
          <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-primary btn-sm w-45">Enregistrer les modifications</button>
            <a routerLink="/admin/sponsors" class="btn btn-secondary btn-sm w-45">Annuler</a>
          </div>
        </form>
      </div>
    </div>
  </div>
