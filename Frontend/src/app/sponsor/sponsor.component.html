<div class="card" style="margin: 6mm;">
    <h5 class="card-header" style="font-size: 36px; font-weight: bold; color: #0056b3;">Sponsors</h5>
    <div class="table-responsive text-nowrap">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>NAME</th>
                    <th>LOGO</th>
                    <th>CONTRIBUTION AMOUNT</th>
                    <th>PARTNERSHIP TYPE
                    </th>
                    <th>EVENTS</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody class="table-border-bottom-0">
                <tr *ngFor="let sponsor of sponsors">
                    <td>{{ sponsor.id }}</td>
                    <td>{{ sponsor.name }}</td>
                    <td>{{ sponsor.logo }}</td>
                    <td>{{ sponsor.contributionAmount }}</td>
                    <td>{{ sponsor.partnershipType }}</td>
                    <td>{{ sponsor.events }}</td>
                    <td>
                        <div class="dropdown">
                            <button type="button" class="btn p-0 dropdown-toggle hide-arrow" data-bs-toggle="dropdown">
                                <i class="bx bx-dots-vertical-rounded"></i>
                            </button>
                            <div class="dropdown-menu">
                                <a class="dropdown-item" href="javascript:void(0);" (click)="sponsor.id !== undefined && editSponsor(sponsor.id)">
                                    <i class="bx bx-edit-alt me-1 text-success"></i> <span class="text-success">Edit</span>
                                </a>
                                <a class="dropdown-item text-danger" href="javascript:void(0);" (click)="sponsor.id !== undefined && deleteSponsor(sponsor.id)">
                                    <i class="bx bx-trash me-1"></i> Delete
                                </a>                           
                            </div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <!-- Ajouter le bouton "Create Event" aligné à droite avec un espace -->
    <div class="text-end mt-3 me-3">
        <a class="btn btn-primary btn-lg" href="/admin/create-sponsor">Create Sponsor</a>
    </div>
</div>
